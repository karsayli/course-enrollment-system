<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course • Course Enrollment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-emerald-500/30 focus:border-emerald-500 transition-all duration-300 border-gray-300;
        }
        .btn-gradient {
            background: linear-gradient(to right, #10b981, #14b8a6);
            transition: all 0.4s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(16, 197, 129, 0.4);
        }
        .btn-success {
            background: linear-gradient(to right, #059669, #0d9488);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-emerald-50 to-teal-100 min-h-screen font-sans antialiased">

<!-- Premium Header (Courses Theme) -->
<header class="bg-white/80 backdrop-blur-lg shadow-lg border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <a href="/home" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-teal-600">
            Course Enrollment System
        </a>
        <a href="/courses" class="text-gray-600 hover:text-emerald-600 flex items-center gap-2 transition font-medium">
            Back to Courses
        </a>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-4xl mx-auto px-6 py-12">

    <!-- Page Title + Course Avatar -->
    <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center w-28 h-28 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-full text-white text-5xl font-bold shadow-2xl mb-6">
            <i class="fas fa-book-open"></i>
        </div>
        <h1 class="text-5xl font-extrabold text-gray-800">
            Edit Course
        </h1>
        <p class="text-xl text-gray-600 mt-3">
            ID: <span class="font-mono text-emerald-600 font-bold" th:text="${course.id}">101</span>
            — <span th:text="${course.code}">CS101</span>
        </p>
    </div>

    <!-- Glassmorphic Edit Form -->
    <div class="glass-card rounded-3xl p-10">
        <form th:action="@{'/courses/edit/' + ${course.id}}" method="post" class="space-y-8">

            <!-- Course Code -->
            <div>
                <label for="code" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    Course Code
                </label>
                <input type="text" id="code" name="code" required
                       th:value="${course.code}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg font-mono uppercase"
                       placeholder="CS101">
            </div>

            <!-- Title -->
            <div>
                <label for="title" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    Course Title
                </label>
                <input type="text" id="title" name="title" required
                       th:value="${course.title}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="Introduction to Programming">
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    Description
                </label>
                <textarea id="description" name="description" required rows="5"
                          class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg resize-none"
                          th:text="${course.description}"></textarea>
            </div>

            <!-- Capacity & ECTS (Side by side) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label for="capacity" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                        Max Capacity
                    </label>
                    <input type="number" id="capacity" name="capacity" required min="1"
                           th:value="${course.capacity}"
                           class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                           placeholder="30">
                </div>
                <div>
                    <label for="ectsCredits" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                        ECTS Credits
                    </label>
                    <input type="number" id="ectsCredits" name="ectsCredits" required min="1"
                           th:value="${course.ectsCredits}"
                           class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                           placeholder="6">
                </div>
            </div>

            <!-- Semester -->
            <div>
                <label for="semester" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    Semester
                </label>
                <input type="text" id="semester" name="semester" required
                       th:value="${course.semester}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="Fall 2025">
            </div>

            <!-- Instructor -->
            <div>
                <label for="instructor" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    Assigned Instructor
                </label>
                <select id="instructor" name="instructorId" required
                        class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option value="">Select an instructor</option>
                    <option th:each="inst : ${instructors}"
                            th:value="${inst.id}"
                            th:text="${inst.fullName}"
                            th:selected="${inst.id} == ${course.instructorId}">
                        Dr. Jane Smith
                    </option>
                </select>
            </div>

            <!-- Action Buttons -->
            <div class="pt-8 flex gap-5 justify-center">
                <button type="submit"
                        class="btn-gradient btn-success text-white font-bold px-12 py-5 rounded-xl text-xl shadow-xl flex items-center gap-3">
                    Update Course
                </button>
                <a href="/courses"
                   class="bg-gray-200 text-gray-700 font-semibold px-10 py-5 rounded-xl hover:bg-gray-300 transition flex items-center gap-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${success}" class="mt-10 text-center text-green-600 text-2xl font-bold animate-bounce">
        Course updated successfully!
    </div>
    <div th:if="${error}" class="mt-10 text-center text-red-600 text-xl font-bold">
        Error: <span th:text="${error}"></span>
    </div>
</main>

<!-- Premium Footer -->
<footer class="bg-gradient-to-r from-gray-900 to-black text-white py-12 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-sm opacity-80">
            © 2025 <span class="font-bold text-emerald-400">Course Enrollment System</span>. All rights reserved.
        </p>
    </div>
</footer>
</body>
</html>
