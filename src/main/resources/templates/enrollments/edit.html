<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Enrollment • Course Enrollment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-amber-500/30 focus:border-amber-500 transition-all duration-300 border-gray-300;
        }
        .btn-gradient {
            background: linear-gradient(to right, #f97316, #f59e0b);
            transition: all 0.4s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(249, 115, 22, 0.45);
        }
        .btn-success {
            background: linear-gradient(to right, #ea580c, #dc2626);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-orange-50 to-amber-100 min-h-screen font-sans antialiased">

<!-- Premium Header (Enrollments Theme) -->
<header class="bg-white/80 backdrop-blur-lg shadow-lg border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <a href="/home" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-amber-600">
            Course Enrollment System
        </a>
        <a href="/enrollments" class="text-gray-600 hover:text-amber-600 flex items-center gap-2 transition font-medium">
            Back to Enrollments
        </a>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-5xl mx-auto px-6 py-12">

    <!-- Hero Section with Dual Avatars -->
    <div class="text-center mb-12">
        <div class="flex justify-center items-center gap-8 mb-8">
            <!-- Student Avatar -->
            <div class="text-center">
                <div class="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-xl">
                    <span th:text="${enrollment.student.fullName.toUpperCase()}">J</span>
                </div>
                <p class="mt-3 font-semibold text-gray-700" th:text="${enrollment.student.fullName}">John Doe</p>
                <p class="text-sm text-gray-500" th:text="${enrollment.student.email}">john@example.com</p>
            </div>

            <div class="text-6xl text-amber-500">
                <i class="fas fa-arrow-right"></i>
            </div>

            <!-- Course Avatar -->
            <div class="text-center">
                <div class="w-24 h-24 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-xl">
                    <i class="fas fa-book"></i>
                </div>
                <p class="mt-3 font-semibold text-gray-700" th:text="${enrollment.course.title}">Math 101</p>
                <p class="text-sm text-gray-500" th:text="${enrollment.course.code}">CS101</p>
            </div>
        </div>

        <h1 class="text-5xl font-extrabold text-gray-800">
            Edit Enrollment
        </h1>
        <p class="text-xl text-gray-600 mt-3">
            ID: <span class="font-mono text-amber-600 font-bold" th:text="${enrollment.id}">1007</span>
        </p>
    </div>

    <!-- Glassmorphic Edit Form -->
    <div class="glass-card rounded-3xl p-10">
        <form th:action="@{'/enrollments/edit/' + ${enrollment.id}}" method="post" class="space-y-10">

            <!-- Student Selection -->
            <div>
                <label for="student" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                    Student
                </label>
                <select id="student" name="studentId" required
                        class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option th:each="student : ${students}"
                            th:value="${student.id}"
                            th:text="${student.fullName + ' (' + student.email + ')'}"
                            th:selected="${student.id} == ${enrollment.student.id}">
                        John Doe (john@example.com)
                    </option>
                </select>
            </div>

            <!-- Course Selection -->
            <div>
                <label for="course" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                    Course
                </label>
                <select id="course" name="courseId" required
                        class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:text="${course.code + ' - ' + course.title + ' (' + course.semester + ')'}"
                            th:selected="${course.id} == ${enrollment.course.id}">
                        CS101 - Intro to Programming (Fall 2025)
                    </option>
                </select>
            </div>

            <!-- Enrollment Status -->
            <div>
                <label for="status" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                    Enrollment Status
                </label>
                <select id="status" name="status" required
                        class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option th:each="status : ${T(com.example.courseenrollmentsystem.dataModel.enums.EnrollmentStatus).values()}"
                            th:value="${status}"
                            th:text="${#strings.toUpperCase(status)}"
                            th:selected="${status} == ${enrollment.status}">
                        ACTIVE
                    </option>
                </select>
            </div>

            <!-- Final Grade -->
            <div>
                <label for="finalGrade" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                    Final Grade <span class="text-sm font-normal text-gray-500">(optional)</span>
                </label>
                <input type="text" id="finalGrade" name="finalGrade"
                       th:value="${enrollment.finalGrade}"
                       placeholder="e.g., A+, 92, Pass"
                       class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
            </div>

            <!-- Date Fields – 3 Columns -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <label for="enrolledAt" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                        Enrolled At
                    </label>
                    <input type="datetime-local" id="enrolledAt" name="enrolledAt"
                           th:value="${enrollment.enrolledAt != null ? #temporals.format(enrollment.enrolledAt, 'yyyy-MM-dd''T''HH:mm') : ''}"
                           class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                </div>
                <div>
                    <label for="droppedAt" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                        Dropped At
                    </label>
                    <input type="datetime-local" id="droppedAt" name="droppedAt"
                           th:value="${enrollment.droppedAt != null ? #temporals.format(enrollment.droppedAt, 'yyyy-MM-dd''T''HH:mm') : ''}"
                           class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                </div>
                <div>
                    <label for="completedAt" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-4">
                        Completed At
                    </label>
                    <input type="datetime-local" id="completedAt" name="completedAt"
                           th:value="${enrollment.completedAt != null ? #temporals.format(enrollment.completedAt, 'yyyy-MM-dd''T''HH:mm') : ''}"
                           class="w-full px-6 py-5 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="pt-10 flex gap-6 justify-center">
                <button type="submit"
                        class="btn-gradient btn-success text-white font-bold px-14 py-6 rounded-xl text-xl shadow-xl flex items-center gap-3">
                    Update Enrollment
                </button>
                <a href="/enrollments"
                   class="bg-gray-200 text-gray-700 font-semibold px-12 py-6 rounded-xl hover:bg-gray-300 transition flex items-center gap-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${success}" class="mt-12 text-center text-green-600 text-2xl font-bold animate-bounce">
        Enrollment updated successfully!
    </div>
    <div th:if="${error}" class="mt-12 text-center text-red-600 text-xl font-bold">
        Error: <span th:text="${error}">Something went wrong</span>
    </div>
</main>

<!-- Premium Footer -->
<footer class="bg-gradient-to-r from-gray-900 to-black text-white py-12 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-sm opacity-80">
            © 2025 <span class="font-bold text-amber-400">Course Enrollment System</span>. All rights reserved.
        </p>
    </div>
</footer>
</body>
</html>
