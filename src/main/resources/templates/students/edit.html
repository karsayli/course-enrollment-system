<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student • Course Enrollment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all duration-300 border-gray-300;
        }
        .btn-gradient {
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            transition: all 0.4s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.4);
        }
        .btn-success {
            background: linear-gradient(to right, #10b981, #059669);
        }
        .btn-success:hover {
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen font-sans antialiased">

<!-- Premium Header -->
<header class="bg-white/80 backdrop-blur-lg shadow-lg border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <a href="/home" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-700">
            Course Enrollment System
        </a>
        <a href="/students" class="text-gray-600 hover:text-indigo-600 flex items-center gap-2 transition font-medium">
            <i class="fas fa-arrow-left"></i> Back to Students
        </a>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-3xl mx-auto px-6 py-12">

    <!-- Page Title + Student Avatar -->
    <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full text-white text-4xl font-bold shadow-2xl mb-6">
            <span th:text="${student.fullName.toUpperCase().charAt(0)}">J</span>
        </div>
        <h1 class="text-5xl font-extrabold text-gray-800">
            Edit Student Profile
        </h1>
        <p class="text-xl text-gray-600 mt-3">
            ID: <span class="font-mono text-indigo-600 font-bold" th:text="${student.id}">123</span>
            — Update information below
        </p>
    </div>

    <!-- Glassmorphic Edit Form -->
    <div class="glass-card rounded-3xl p-10">
        <form th:action="@{'/students/edit'}" method="post" class="space-y-8">

            <!-- Hidden ID -->
            <input type="hidden" name="id" th:value="${student.id}" />

            <!-- Full Name -->
            <div>
                <label for="fullName" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-user text-indigo-600"></i> Full Name
                </label>
                <input type="text" id="fullName" name="fullName" required
                       th:value="${student.fullName}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="Enter full name">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-envelope text-indigo-600"></i> Email Address
                </label>
                <input type="email" id="email" name="email" required
                       th:value="${student.email}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="student@example.com">
            </div>

            <!-- Year of Study -->
            <div>
                <label for="yearOfStudy" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-calendar-alt text-indigo-600"></i> Year of Study
                </label>
                <input type="number" id="yearOfStudy" name="yearOfStudy" min="1" max="8"
                       th:value="${student.yearOfStudy}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="e.g., 3">
            </div>

            <!-- Birth Date -->
            <div>
                <label for="birthDate" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-birthday-cake text-indigo-600"></i> Date of Birth
                </label>
                <input type="date" id="birthDate" name="birthDate"
                       th:value="${student.birthDate}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
            </div>

            <!-- Gender -->
            <div>
                <label for="gender" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-venus-mars text-indigo-600"></i> Gender
                </label>
                <select id="gender" name="gender"
                        class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option value="">Select Gender</option>
                    <option value="MALE" th:selected="${student.gender == 'MALE'}">Male</option>
                    <option value="FEMALE" th:selected="${student.gender == 'FEMALE'}">Female</option>
                    <option value="OTHER" th:selected="${student.gender == 'OTHER'}">Other / Prefer not to say</option>
                </select>
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-user-check text-indigo-600"></i> Account Status
                </label>
                <select id="status" name="status"
                        class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option value="">Select Status</option>
                    <option value="ACTIVE" th:selected="${student.status == 'ACTIVE'}">Active</option>
                    <option value="INACTIVE" th:selected="${student.status == 'INACTIVE'}">Inactive</option>
                </select>
            </div>

            <!-- Action Buttons -->
            <div class="pt-8 flex gap-5 justify-center">
                <button type="submit"
                        class="btn-gradient btn-success text-white font-bold px-12 py-5 rounded-xl text-xl shadow-xl flex items-center gap-3">
                    <i class="fas fa-save"></i>
                    Update Student
                </button>
                <a href="/students"
                   class="bg-gray-200 text-gray-700 font-semibold px-10 py-5 rounded-xl hover:bg-gray-300 transition flex items-center gap-2">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Optional Success/Error Messages -->
    <div th:if="${success}" class="mt-10 text-center text-green-600 text-2xl font-bold animate-bounce">
        Student updated successfully!
    </div>
    <div th:if="${error}" class="mt-10 text-center text-red-600 text-xl font-bold">
        Error: <span th:text="${error}"></span>
    </div>
</main>

<!-- Premium Footer -->
<footer class="bg-gradient-to-r from-gray-900 to-black text-white py-12 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-sm opacity-80">
            © 2025 <span class="font-bold text-indigo-400">Course Enrollment System</span>. All rights reserved.
        </p>
    </div>
</footer>
</body>
</html>
