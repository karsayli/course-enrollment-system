<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Instructor • Course Enrollment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .input-focus {
            @apply focus:ring-4 focus:ring-purple-500/30 focus:border-purple-500 transition-all duration-300 border-gray-300;
        }
        .btn-gradient {
            background: linear-gradient(to right, #9333ea, #ec4899);
            transition: all 0.4s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.4);
        }
        .btn-success {
            background: linear-gradient(to right, #7c3aed, #db2777);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-purple-50 to-pink-100 min-h-screen font-sans antialiased">

<!-- Premium Header -->
<header class="bg-white/80 backdrop-blur-lg shadow-lg border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <a href="/home" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">
            Course Enrollment System
        </a>
        <a href="/instructors" class="text-gray-600 hover:text-purple-600 flex items-center gap-2 transition font-medium">
            <i class="fas fa-arrow-left"></i> Back to Instructors
        </a>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-4xl mx-auto px-6 py-12">

    <!-- Page Title + Instructor Avatar -->
    <div class="text-center mb-12">
        <div class="inline-flex items-center justify-center w-28 h-28 bg-gradient-to-br from-purple-500 to-pink-600 rounded-full text-white text-5xl font-bold shadow-2xl mb-6">
            <span th:text="${instructor.fullName.toUpperCase().charAt(0)}">J</span>
        </div>
        <h1 class="text-5xl font-extrabold text-gray-800">
            Edit Instructor Profile
        </h1>
        <p class="text-xl text-gray-600 mt-3">
            ID: <span class="font-mono text-purple-600 font-bold" th:text="${instructor.id}">42</span>
            — Update faculty information below
        </p>
    </div>

    <!-- Glassmorphic Edit Form -->
    <div class="glass-card rounded-3xl p-10">
        <form th:action="@{'/instructors/edit/' + ${instructor.id}}" method="post" class="space-y-8">

            <!-- Full Name -->
            <div>
                <label for="fullName" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-user-tie text-purple-600"></i> Full Name
                </label>
                <input type="text" id="fullName" name="fullName" required
                       th:value="${instructor.fullName}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="Dr. Jane Smith">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-envelope text-purple-600"></i> Email Address
                </label>
                <input type="email" id="email" name="email" required
                       th:value="${instructor.email}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="jane.smith@university.edu">
            </div>

            <!-- Department -->
            <div>
                <label for="department" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-building text-purple-600"></i> Department
                </label>
                <input type="text" id="department" name="department" required
                       th:value="${instructor.department}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="Computer Science">
            </div>

            <!-- Office Room -->
            <div>
                <label for="officeRoom" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-door-open text-purple-600"></i> Office Room
                </label>
                <input type="text" id="officeRoom" name="officeRoom"
                       th:value="${instructor.officeRoom}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg"
                       placeholder="ENG-301">
            </div>

            <!-- Hire Date -->
            <div>
                <label for="hireDate" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-calendar-check text-purple-600"></i> Hire Date
                </label>
                <input type="date" id="hireDate" name="hireDate"
                       th:value="${instructor.hireDate}"
                       class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
            </div>

            <!-- Rank -->
            <div>
                <label for="rank" class="flex items-center gap-3 text-lg font-semibold text-gray-700 mb-3">
                    <i class="fas fa-medal text-purple-600"></i> Academic Rank
                </label>
                <select id="rank" name="rank"
                        class="w-full px-6 py-4 rounded-xl border bg-white/70 input-focus text-gray-800 text-lg">
                    <option value="">Select Rank</option>
                    <option value="ASSISTANT_PROFESSOR" th:selected="${instructor.rank == 'ASSISTANT_PROFESSOR'}">
                        Assistant Professor
                    </option>
                    <option value="ASSOCIATE_PROFESSOR" th:selected="${instructor.rank == 'ASSOCIATE_PROFESSOR'}">
                        Associate Professor
                    </option>
                    <option value="LECTURER" th:selected="${instructor.rank == 'LECTURER'}">
                        Lecturer
                    </option>
                    <option value="PROFESSOR" th:selected="${instructor.rank == 'PROFESSOR'}">
                        Professor
                    </option>
                </select>
            </div>

            <!-- Action Buttons -->
            <div class="pt-8 flex gap-5 justify-center">
                <button type="submit"
                        class="btn-gradient btn-success text-white font-bold px-12 py-5 rounded-xl text-xl shadow-xl flex items-center gap-3">
                    <i class="fas fa-save"></i>
                    Update Instructor
                </button>
                <a href="/instructors"
                   class="bg-gray-200 text-gray-700 font-semibold px-10 py-5 rounded-xl hover:bg-gray-300 transition flex items-center gap-2">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${success}" class="mt-10 text-center text-green-600 text-2xl font-bold animate-bounce">
        Instructor updated successfully!
    </div>
    <div th:if="${error}" class="mt-10 text-center text-red-600 text-xl font-bold">
        Error: <span th:text="${error}"></span>
    </div>
</main>

<!-- Premium Footer -->
<footer class="bg-gradient-to-r from-gray-900 to-black text-white py-12 mt-20">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-sm opacity-80">
            © 2025 <span class="font-bold text-purple-400">Course Enrollment System</span>. All rights reserved.
        </p>
    </div>
</footer>
</body>
</html>
