version: "3.9"

services:
  db:
    image: postgres:16
    container_name: courseapp_postgres
    restart: always
    environment:
      POSTGRES_DB: coursedb
      POSTGRES_USER: courseuser
      POSTGRES_PASSWORD: coursepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: courseapp_backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/coursedb
      SPRING_DATASOURCE_USERNAME: courseuser
      SPRING_DATASOURCE_PASSWORD: coursepass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_LOB_NON_CONTEXTUAL_CREATION: true
      SPRING_LIQUIBASE_ENABLED: false
      SPRING_SESSION_JDBC_INITIALIZE_SCHEMA: always
      SERVER_ADDRESS: 0.0.0.0

volumes:
  postgres_data:
